version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bookverse-api:${IMAGE_TAG}
    container_name: bookverse-api
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Server=db;Database=BookVerseDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - AutoMapper__LicenseKey=${AUTOMAPPER_LICENSE_KEY}
      - JwtOptions__Secret=${JWT_SECRET}
      - JwtOptions__Issuer=${JWT_ISSUER}
      - JwtOptions__Audience=${JWT_AUDIENCE}
      - JwtOptions__ExpirationTimeInMinutes=${JWT_EXPIRATION}
      - AdminUser__Email=${ADMIN_EMAIL}
      - AdminUser__Password=${ADMIN_PASSWORD}
      - AdminUser__FirstName=${ADMIN_FIRSTNAME}
      - AdminUser__LastName=${ADMIN_LASTNAME}
      - StripeOptions__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - StripeOptions__SecretKey=${STRIPE_SECRET_KEY}
      - StripeOptions__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - DataProtection__KeysPath=/app/dataprotection-keys
      - Cors__AllowedOrigin=${CORS_ALLOWED_ORIGIN:-https://bookverseapi.com}
      - EmailOptions__SmtpHost=${SMTP_HOST}
      - EmailOptions__SmtpPort=${SMTP_PORT}
      - EmailOptions__FromEmail=${FROM_EMAIL}
      - EmailOptions__FromName=${FROM_NAME}
      - EmailOptions__SmtpUsername=${SMTP_USERNAME}
      - EmailOptions__SmtpPassword=${SMTP_PASSWORD}
    volumes:
      - dataprotection:/app/dataprotection-keys
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookverse-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q 'SELECT 1' -C || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: bookverse-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD","redis-cli","ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sqldata:
  redisdata:
  dataprotection: