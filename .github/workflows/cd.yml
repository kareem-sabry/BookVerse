name: CD

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ master ]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://github.com/${{ github.repository_owner }}/bookverse-api/pkgs/container/bookverse-api

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bookverse-api:latest
            ghcr.io/${{ github.repository_owner }}/bookverse-api:${{ github.event.workflow_run.head_sha }}