version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bookverse-api:${IMAGE_TAG}  
    container_name: bookverse-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=BookVerseDb;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - JwtOptions__Secret=${JWT_SECRET}
      - JwtOptions__Issuer=${JWT_ISSUER}
      - JwtOptions__Audience=${JWT_AUDIENCE}
      - JwtOptions__ExpirationTimeInMinutes=${JWT_EXPIRATION}
      - AdminUser__Email=${ADMIN_EMAIL}
      - AdminUser__Password=${ADMIN_PASSWORD}
      - AdminUser__FirstName=${ADMIN_FIRSTNAME}
      - AdminUser__LastName=${ADMIN_LASTNAME}
      - StripeOptions__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - StripeOptions__SecretKey=${STRIPE_SECRET_KEY}
      - StripeOptions__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - EmailOptions__SmtpHost=${SMTP_HOST}
      - EmailOptions__SmtpPort=${SMTP_PORT}
      - EmailOptions__SmtpUsername=${SMTP_USERNAME}
      - EmailOptions__SmtpPassword=${SMTP_PASSWORD}
      - EmailOptions__FromEmail=${FROM_EMAIL}
      - EmailOptions__FromName=${FROM_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: bookverse-db
    environment:
      - POSTGRES_DB=BookVerseDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d BookVerseDb" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: bookverse-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD","redis-cli","ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata: